function adminDag(sak){
  const m=S.mtg;
  return`${m.agenda.map(s=>`
  <button onclick="goSak('${s.id}')" style="display:flex;align-items:center;gap:11px;padding:12px;border-radius:var(--r);border:1.5px solid ${s.id===sak?.id?'var(--dark)':'var(--light)'};background:${s.id===sak?.id?'var(--pale)':'#fff'};cursor:pointer;text-align:left;width:100%;margin-bottom:7px;opacity:${done(s)?.72:1};">
    <div class="snr" style="background:${done(s)?'var(--green)':s.id===sak?.id?'var(--dark)':'var(--light)'};color:${done(s)||s.id===sak?.id?'#fff':'var(--muted)'};">${done(s)?'✓':s.nr}</div>
    <div style="flex:1;"><div style="font-weight:600;font-size:.84rem;color:var(--text);">${s.title}</div><div style="margin-top:3px;">${ttag(s.type,true)}</div></div>
    ${s.st==='vote_open'?'<div style="width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 1s infinite;"></div>':''}
  </button>`).join('')}
  <button onclick="addSak()" style="width:100%;padding:11px;border-radius:var(--r);border:2px dashed rgba(126,184,151,.38);background:transparent;font-size:.8rem;color:var(--muted);cursor:pointer;margin-top:4px;">+ Legg til sak</button>`;
}

function adminTal(){
  const m=S.mtg;
  return`<div>
  <div class="slbl">Taleliste (${m.speakers.length})</div>
  ${m.speakers.length===0?`<div style="text-align:center;padding:24px;color:var(--muted);font-size:.83rem;"><div style="font-size:1.7rem;margin-bottom:7px;">🎤</div>Ingen i talelisten</div>`:''}
  ${m.speakers.map((sp,i)=>`<div class="spi" style="background:${i===0?'var(--light)':'var(--pale)'};border:1px solid ${i===0?'var(--accent)':'var(--light)'};border-radius:10px;margin-bottom:5px;">
    <div class="ava" style="background:${i===0?'var(--dark)':'var(--pale)'};color:${i===0?'#fff':'var(--muted)'};">${sp.ini}</div>
    <div style="flex:1;font-size:.82rem;font-weight:${i===0?700:400};color:var(--text);">${sp.name}${i===0?' — har ordet':''}</div>
    <button onclick="rmSpk('${sp.id}')" style="background:transparent;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;">×</button>
  </div>`).join('')}
  <div style="display:flex;gap:7px;margin-top:10px;">
    ${MBR.map(mb=>`<button onclick="addSpkM('${mb.id}')" style="padding:6px 10px;border-radius:7px;border:1.5px solid var(--light);background:#fff;font-size:.7rem;font-weight:600;cursor:pointer;">${mb.ini}</button>`).join('')}
  </div>
  ${m.speakers.length>0?`<button onclick="rmSpk(S.mtg.speakers[0]?.id)" class="btn bp bfull" style="margin-top:10px;">➡️ Neste taler</button>`:''}
</div>`;
}

function adminLog(){
  const m=S.mtg;
  return`<div>
  <div class="slbl">Møtelogg</div>
  ${m.log.length===0?`<div style="text-align:center;padding:24px;color:var(--muted);font-size:.83rem;"><div style="font-size:1.7rem;margin-bottom:7px;">📝</div>Ingen hendelser ennå</div>`:''}
  ${m.log.slice(0,20).map(l=>`<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--light);">
    <span style="font-size:.65rem;color:var(--muted);flex-shrink:0;margin-top:1px;">${l.time}</span>
    <span style="font-size:.78rem;color:var(--text);">${l.text}</span>
  </div>`).join('')}
</div>`;
}

function memTabs(sak,mem,myV,hasO,dc,tV){
  const m=S.mtg; const t=m.mt;
  if(t==='status') return`<div>
    <div class="slbl">Møtestatus</div>
    ${S.mtg.agenda.map(s=>`<div style="display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--r);margin-bottom:7px;background:${s.id===sak.id?'var(--light)':'#fff'};border:1px solid ${s.id===sak.id?'var(--accent)':'var(--light)'};">
      <div class="snr" style="background:${done(s)?'var(--green)':s.id===sak.id?'var(--dark)':'var(--light)'};color:${done(s)||s.id===sak.id?'#fff':'var(--muted)'};">${done(s)?'✓':s.nr}</div>
      <div style="flex:1;"><div style="font-weight:600;font-size:.81rem;color:var(--text);">${s.title}</div><div style="font-size:.66rem;color:var(--muted);margin-top:1px;">${done(s)?'✅ Ferdig':s.id===sak.id?'▶ Nå':'Venter'}</div></div>
    </div>`).join('')}
  </div>`;
  if(t==='talere') return memTalere();
  // SAK tab
  const isAccl=sak.type==='accl'; const isVote=['vote','elec'].includes(sak.type)||['vote_open','closed'].includes(sak.st);
  return`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">
    <div style="font-size:.72rem;color:var(--muted);">Sak ${sak.nr} av ${m.agenda.length}</div>
    <button onclick="showMemPick()" class="btn bg bsm">Bytt deltaker: ${mem.ini}</button>
  </div>
  <div class="card" style="margin-bottom:11px;">
    ${ttag(sak.type)}
    <div style="font-size:.98rem;font-weight:700;color:var(--dark);margin:7px 0 5px;line-height:1.35;">${sak.title}</div>
    ${sak.desc?`<div style="font-size:.76rem;color:var(--muted);line-height:1.55;margin-bottom:7px;">${sak.desc}</div>`:''}
    ${sak.proposal?`<div style="background:var(--pale);border-radius:9px;padding:9px 12px;border:1px solid var(--light);"><div class="slbl" style="margin-bottom:3px;">Forslag til vedtak</div><div style="font-size:.82rem;font-weight:600;color:var(--text);">${sak.proposal}</div></div>`:''}
  </div>
  ${sak.st==='accl_open'?`<div class="card" style="margin-bottom:11px;border:2px solid ${hasO?'var(--red)':'var(--accent)'};">
    <div style="font-weight:700;margin-bottom:8px;color:var(--dark);">👐 Akklamasjon pågår — ${m.countdown}s igjen</div>
    ${!hasO?`<div style="display:flex;gap:7px;">
      <button onclick="sendObj('${sak.id}')" class="btn bred" style="flex:1;">⚠️ Jeg har innsigelse</button>
    </div>
    ${m.showObj?`<div style="margin-top:8px;"><input placeholder="Begrunn innsigelsen (valgfritt)" oninput="S.mtg.objTxt=this.value" style="width:100%;padding:8px 11px;border:1.5px solid var(--light);border-radius:9px;font-size:.8rem;"><button onclick="sendObj('${sak.id}')" class="btn bred bfull" style="margin-top:6px;">Send innsigelse</button></div>`:''}`:`<div style="background:var(--redL);border-radius:9px;padding:9px 12px;font-size:.78rem;color:var(--red);margin-bottom:8px;">Du har registrert innsigelse</div><button onclick="wdObj('${sak.id}')" class="btn bg bsm">Trekk tilbake</button>`}
  </div>`:''}
  ${sak.st==='pass'?`<div class="card" style="background:var(--greenL);border:2px solid rgba(22,163,74,.22);text-align:center;padding:18px;"><div style="font-size:1.7rem;margin-bottom:6px;">✅</div><div style="font-weight:700;color:var(--green);">Vedtatt ved akklamasjon</div></div>`:''}
  ${isVote&&sak.st==='vote_open'?`<div class="card" style="margin-bottom:11px;">
    <div style="font-weight:700;color:var(--dark);margin-bottom:10px;">🗳️ Din stemme</div>
    ${(sak.opts||[]).map(o=>`<button onclick="castV('${sak.id}','${o.id}')" style="display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:var(--r);border:2px solid ${myV===o.id?'var(--dark)':'var(--light)'};background:${myV===o.id?'var(--pale)':'#fff'};cursor:pointer;text-align:left;width:100%;margin-bottom:7px;">
      <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${myV===o.id?'var(--dark)':'var(--light)'};background:${myV===o.id?'var(--dark)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${myV===o.id?'<div style="width:8px;height:8px;border-radius:50%;background:#fff;"></div>':''}</div>
      <span style="font-size:.86rem;font-weight:${myV===o.id?700:400};color:var(--text);">${o.l}</span>
    </button>`).join('')}
  </div>`:''}
  ${isVote&&sak.st==='closed'?resCard(sak):''}
  ${!hasO&&sak.st==='accl_open'?'':`<button onclick="addSpk()" class="btn bg bfull" style="margin-top:7px;">🎤 Tegn meg til talelisten</button>`}`;
}

function memTalere(){
  const m=S.mtg;
  return(m.speakers.length===0?'<div style="text-align:center;padding:28px;color:var(--muted);font-size:.83rem;"><div style="font-size:1.7rem;margin-bottom:7px;">🎤</div>Ingen i talelisten</div>':'')
  +m.speakers.map((sp,i)=>`<div class="spi" style="background:${i===0?'var(--light)':'var(--pale)'};border:1px solid ${i===0?'var(--accent)':'var(--light)'};border-radius:10px;margin-bottom:5px;">
    <div class="ava" style="background:${i===0?'var(--dark)':'var(--pale)'};color:${i===0?'#fff':'var(--muted)'};">${sp.ini}</div>
    <div style="flex:1;font-size:.82rem;font-weight:${i===0?700:400};color:var(--text);">${sp.name}${i===0?' — har ordet':''}</div>
  </div>`).join('')
  +(!m.speakers.find(s=>s.id===m.memId)?'<button onclick="addSpk()" class="btn bp bfull" style="margin-top:10px;">🙋 Tegn meg til talelisten</button>':'');
}

function showMemPick(){
  document.querySelectorAll('.mo').forEach(e=>e.remove());
  const html=`<div class="mo" onclick="this.remove()"><div class="ms" onclick="event.stopPropagation()" style="max-width:480px;">
    <div class="mh"></div><div class="slbl">Hvem er du?</div>
    <div class="g2">${MBR.map(m=>`<button onclick="S.mtg.memId='${m.id}';document.querySelector('.mo').remove();R();" style="display:flex;align-items:center;gap:9px;padding:11px;border-radius:var(--r);border:2px solid ${S.mtg.memId===m.id?'var(--dark)':'var(--light)'};background:${S.mtg.memId===m.id?'var(--pale)':'#fff'};cursor:pointer;">
      <div class="ava" style="background:${S.mtg.memId===m.id?'var(--dark)':'var(--pale)'};color:${S.mtg.memId===m.id?'#fff':'var(--muted)'};">${m.ini}</div>
      <div style="flex:1;"><div style="font-weight:600;font-size:.84rem;">${m.name}</div></div>
    </button>`).join('')}</div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

// Meeting actions
function openMtg(){S.mtg.open=true;alog('Møtet åpnet');R();}
function goSak(id){if(!id)return;S.mtg.sakId=id;R();}
function addSak(){const nr=S.mtg.agenda.length+1;const s={id:uid(),nr,title:'Ny sak',desc:'',type:'accl',st:'pend',proposal:'',obj:[],opts:[],log:[]};S.mtg.agenda.push(s);S.mtg.sakId=s.id;S.mtg.at='sak';R();}
function openAccl(id){
  usak(id,{st:'accl_open',obj:[]});S.mtg.countdown=30;
  alog('👐 Akklamasjon: '+S.mtg.agenda.find(s=>s.id===id)?.title);
  if(cdTimer)clearInterval(cdTimer);
  cdTimer=setInterval(()=>{S.mtg.countdown--;if(S.mtg.countdown<=0){clearInterval(cdTimer);const s=S.mtg.agenda.find(x=>x.id===id);if(!s?.obj?.length)passAccl(id);else R();}else R();},1000);R();
}
function passAccl(id){if(cdTimer)clearInterval(cdTimer);const s=S.mtg.agenda.find(x=>x.id===id);usak(id,{st:'pass'});alog('✅ Akklamasjon vedtatt: '+s?.title);R();}
function escVote(id){if(cdTimer)clearInterval(cdTimer);const s=S.mtg.agenda.find(x=>x.id===id);const opts=s?.opts?.length>0?s.opts:[{id:uid(),l:'For',v:[]},{id:uid(),l:'Mot',v:[]},{id:uid(),l:'Avholdende',v:[]}];usak(id,{st:'vote_open',opts});alog('⚡ Eskalert: '+s?.title);R();}
function sendObj(id){const mid=S.mtg.memId;const name=MBR.find(m=>m.id===mid)?.name;const reason=S.mtg.objTxt||'';const s=S.mtg.agenda.find(x=>x.id===id);s.obj=[...(s.obj||[]),{id:uid(),mid,mn:name,reason}];S.mtg.showObj=false;S.mtg.objTxt='';alog('⚠️ Innsigelse fra '+name);R();}
function wdObj(id){const mid=S.mtg.memId;const s=S.mtg.agenda.find(x=>x.id===id);s.obj=s.obj.filter(o=>o.mid!==mid);R();}
function openV(id){usak(id,{st:'vote_open'});alog('🗳️ Votering: '+S.mtg.agenda.find(s=>s.id===id)?.title);R();}
function castV(sakId,optId){const mid=S.mtg.memId;S.mtg.agenda=S.mtg.agenda.map(s=>s.id!==sakId?s:{...s,opts:s.opts.map(o=>({...o,v:o.id===optId?[...o.v.filter(v=>v!==mid),mid]:o.v.filter(v=>v!==mid)}))});R();}
function closeV(id){const s=S.mtg.agenda.find(x=>x.id===id);const top=[...(s?.opts||[])].sort((a,b)=>b.v.length-a.v.length)[0];usak(id,{st:'closed'});alog('🔒 Vedtak: "'+top?.l+'" ('+top?.v.length+' stemmer)');R();}
function addOpt(id,l){S.mtg.agenda=S.mtg.agenda.map(s=>s.id===id?{...s,opts:[...(s.opts||[]),{id:uid(),l,v:[]}]}:s);S.mtg.noInput='';alog('Benkeforslag: "'+l+'"');R();}
function addSpk(){const m=S.mtg;if(!m.speakers.find(s=>s.id===m.memId)){const mem=MBR.find(m2=>m2.id===m.memId);m.speakers.push(mem);}R();}
function addSpkM(id){if(!id)return;const mem=MBR.find(m=>m.id===id);if(mem&&!S.mtg.speakers.find(s=>s.id===id))S.mtg.speakers.push(mem);R();}
function rmSpk(id){S.mtg.speakers=S.mtg.speakers.filter(s=>s.id!==id);R();}
function setMtgType(t){S.mtg.meetingType=t;R();}

function showAddonModal(id){
  const addon=ADDONS[id]; if(!addon)return;
  document.querySelectorAll('.mo').forEach(e=>e.remove());
  const html=`<div class="mo" onclick="this.remove()"><div class="ms" onclick="event.stopPropagation()" style="max-width:480px;">
    <div class="mh"></div>
    <div style="text-align:center;margin-bottom:18px;">
      <div style="font-size:2.5rem;margin-bottom:8px;">${addon.icon}</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--dark);margin-bottom:6px;">${addon.label}</h2>
      <p style="font-size:.78rem;color:var(--muted);line-height:1.6;">${addon.desc}</p>
    </div>
    <div style="background:var(--pale);border-radius:12px;padding:16px;margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:.8rem;color:var(--muted);">Månedlig</span>
        <span style="font-size:1.2rem;font-weight:700;color:var(--dark);">${addon.mo} kr/mnd</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:.8rem;color:var(--muted);">Årlig</span>
        <div style="text-align:right;"><span style="font-size:1.2rem;font-weight:700;color:var(--dark);">${addon.yr} kr/mnd</span><div style="font-size:.65rem;color:var(--accent);">Spar ${(addon.mo-addon.yr)*12} kr/år</div></div>
      </div>
    </div>
    <div class="g2">
      <button onclick="document.querySelector('.mo').remove()" class="btn bg blg">Avbryt</button>
      <button onclick="toggleAddon('${id}');document.querySelector('.mo').remove();notify(hasAddon('${id}')?'✅ ${addon.label} aktivert':'Tilleggsmodul fjernet');R();" class="btn bp blg">Aktiver modul</button>
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

// Init
R();
</script>
</body>
</html>
